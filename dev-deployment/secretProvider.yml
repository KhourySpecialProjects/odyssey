apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: frontend-secrets
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "odyssey/dev/frontend"
        objectType: "secretsmanager"
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: backend-secrets
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "odyssey/dev/backend"
        objectType: "secretsmanager"
