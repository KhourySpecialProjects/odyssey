name: Prettier Check

on:
  push:
    branches:
      - main
      - develop
      - production
      
  pull_request:
    branches:
      - main
      - develop
      - production
      - 'feature/**'
      - 'bug/**'
      - 'improvement/**'

jobs:
  prettier-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier . --check
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Copy env
        shell: bash
        run: cp .env.example .env


      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: pnpm lint && pnpm lint:ws

