name: Automatic Semantic Versioning

on:
  push:
    branches:
      - main
      - develop

jobs:
  version-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Get merge commit details
        id: merge_info
        run: |
          # Use GitHub event data for reliable branch detection
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
          else
            # For push events, try to extract from commit message
            COMMIT_MSG=$(git log -1 --pretty=%B)
            BRANCH_NAME=$(echo "$COMMIT_MSG" | grep -oP "(from [^/]+/\K[^\s]+|Merge branch '\K[^']+)" | head -1 || echo "")
            
            if [ -z "$BRANCH_NAME" ]; then
              # Fallback to current branch
              BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
            fi
          fi
          
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "Detected branch: $BRANCH_NAME"

      - name: Determine version bump type
        id: bump_type
        run: |
          BRANCH="${{ steps.merge_info.outputs.branch_name }}"
          TARGET_BRANCH="${{ github.ref_name }}"
          
          echo "Source branch: $BRANCH"
          echo "Target branch: $TARGET_BRANCH"
          
          # Default to patch
          BUMP_TYPE="patch"
          
          # Determine bump type based on branch name and target
          if [[ "$TARGET_BRANCH" == "main" ]]; then
            # Any push to main (production) is a major version
            BUMP_TYPE="major"
            echo "Production deployment detected - MAJOR version bump"
          elif [[ "$TARGET_BRANCH" == "develop" ]]; then
            if [[ "$BRANCH" == feature/* ]]; then
              BUMP_TYPE="minor"
              echo "Feature branch detected - MINOR version bump"
            elif [[ "$BRANCH" == bug/* ]] || [[ "$BRANCH" == improvement/* ]]; then
              BUMP_TYPE="patch"
              echo "Bug/Improvement branch detected - PATCH version bump"
            else
              BUMP_TYPE="patch"
              echo "Unknown branch type - defaulting to PATCH version bump"
            fi
          fi
          
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Version bump type: $BUMP_TYPE"

      - name: Calculate new version
        id: new_version
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"
          BUMP_TYPE="${{ steps.bump_type.outputs.bump_type }}"
          
          # Remove 'v' prefix if present
          VERSION=${LATEST_TAG#v}
          
          # Split version into components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Bump the appropriate version component
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Create and push tag
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          BUMP_TYPE="${{ steps.bump_type.outputs.bump_type }}"
          BRANCH="${{ steps.merge_info.outputs.branch_name }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create annotated tag with details
          TAG_MESSAGE=$(cat <<EOF
          Release $NEW_VERSION
          
          Bump type: $BUMP_TYPE
          Source branch: $BRANCH
          Target branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          EOF
          )
          git tag -a "$NEW_VERSION" -m "$TAG_MESSAGE"
          
          git push origin "$NEW_VERSION"
          echo "Created and pushed tag: $NEW_VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ github.ref_name }}" == "develop" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          
          gh release create "${{ steps.new_version.outputs.new_version }}" \
            --title "Release ${{ steps.new_version.outputs.new_version }}" \
            --notes "## Release ${{ steps.new_version.outputs.new_version }}
            
            **Type:** ${{ steps.bump_type.outputs.bump_type }} release
            **Branch:** ${{ steps.merge_info.outputs.branch_name }}
            **Target:** ${{ github.ref_name }}
            
            ### Changes
            See commit history for details." \
            $PRERELEASE_FLAG