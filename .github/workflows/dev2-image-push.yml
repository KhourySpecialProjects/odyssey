  build-and-push-backend-to-dev2:
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION}}
      
      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        
      - name: Build and tag Docker image
        run: |
          cd ./backend
          docker build -t ${{ secrets.ECR_DEV2_BACKEND_REPOSITORY }}:latest -f ecs.Dockerfile .
        
        
      - name: Push Docker image to ECR
        run: |
          docker tag ${{ secrets.ECR_DEV2_BACKEND_REPOSITORY }}:latest ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_DEV2_BACKEND_REPOSITORY }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_DEV2_BACKEND_REPOSITORY }}:latest
              
