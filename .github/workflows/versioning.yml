name: Create Release (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.13.0)'
        required: true
        type: string
      bump_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      notes:
        description: 'Release notes (optional)'
        required: false
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must match format v{major}.{minor}.{patch} (e.g., v1.13.0)"
            exit 1
          fi

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Error: Tag $VERSION already exists"
            exit 1
          fi

          echo "Version $VERSION is valid and available"

      - name: Create and push tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          NOTES="${{ github.event.inputs.notes }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG_MSG=$(printf "Release %s\n\nType: %s\nBranch: %s\nCommit: %s" \
            "$VERSION" "$BUMP_TYPE" "${{ github.ref_name }}" "${{ github.sha }}")

          if [ -n "$NOTES" ]; then
            TAG_MSG=$(printf "%s\n\nNotes: %s" "$TAG_MSG" "$NOTES")
          fi

          git tag -a "$VERSION" -m "$TAG_MSG"
          git push origin "$VERSION"
          echo "Created and pushed tag: $VERSION"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          release_name: Release ${{ github.event.inputs.version }}
          body: |
            ## Release ${{ github.event.inputs.version }}

            **Type:** ${{ github.event.inputs.bump_type }}
            **Branch:** ${{ github.ref_name }}

            ${{ github.event.inputs.notes || 'See commit history for details.' }}
          draft: false
          prerelease: false
