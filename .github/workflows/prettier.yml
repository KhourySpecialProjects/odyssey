name: Prettier Check

on:
  push:
    branches:
      - main
      - develop
      - production
      
  pull_request:
    branches:
      - main
      - develop
      - production
      - 'feature/**'
      - 'bug/**'
      - 'improvement/**'
      - 'dependabot/**'

jobs:
  prettier-check:
    runs-on: blacksmith-2vcpu-ubuntu-2204

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Prettier check
        run: npx prettier . --check
  lint:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

