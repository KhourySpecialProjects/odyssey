name: Automatic Semantic Versioning

on:
  push:
    branches:
      - production
      - develop
  pull_request:
    types: [closed]
    branches:
      - production
      - develop

jobs:
  version-and-release:
    # Only run on merged PRs or direct pushes
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Get merge commit details
        id: merge_info
        run: |
          # Get the commit message of the latest commit
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          
          # Extract branch name from merge commit message
          BRANCH_NAME=$(echo "$COMMIT_MSG" | grep -oP "(from [^/]+/\K[^\s]+|Merge branch '\K[^']+)" | head -1 || echo "")
          
          if [ -z "$BRANCH_NAME" ]; then
            BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          fi
          
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "Detected branch: $BRANCH_NAME"
          
          # Store full commit message for analysis
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Analyze commits for conventional commit format
        id: analyze_commits
        run: |
          TARGET_BRANCH="${{ github.ref_name }}"
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"
          
          # Get all commits since last tag
          COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
          
          echo "Analyzing commits:"
          echo "$COMMITS"
          
          # Check for breaking changes
          HAS_BREAKING=false
          if echo "$COMMITS" | grep -qE "(BREAKING CHANGE:|!:|^[a-z]+\!:)"; then
            HAS_BREAKING=true
          fi
          
          # Check for features
          HAS_FEATURE=false
          if echo "$COMMITS" | grep -qE "^feat(\([^)]*\))?:"; then
            HAS_FEATURE=true
          fi
          
          # Check for fixes
          HAS_FIX=false
          if echo "$COMMITS" | grep -qE "^fix(\([^)]*\))?:"; then
            HAS_FIX=true
          fi
          
          echo "has_breaking=$HAS_BREAKING" >> $GITHUB_OUTPUT
          echo "has_feature=$HAS_FEATURE" >> $GITHUB_OUTPUT
          echo "has_fix=$HAS_FIX" >> $GITHUB_OUTPUT
          
          echo "Breaking changes: $HAS_BREAKING"
          echo "Features: $HAS_FEATURE"
          echo "Fixes: $HAS_FIX"

      - name: Check PR labels
        id: pr_labels
        if: github.event_name == 'pull_request'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          
          # Get labels from the PR event payload instead of using gh CLI
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          
          echo "PR Labels: $LABELS"
          
          HAS_BREAKING_LABEL=false
          HAS_FEATURE_LABEL=false
          HAS_FIX_LABEL=false
          
          if echo "$LABELS" | grep -qiE "(breaking|major)"; then
            HAS_BREAKING_LABEL=true
          fi
          
          if echo "$LABELS" | grep -qiE "(feature|enhancement|minor)"; then
            HAS_FEATURE_LABEL=true
          fi
          
          if echo "$LABELS" | grep -qiE "(bug|fix|patch)"; then
            HAS_FIX_LABEL=true
          fi
          
          echo "has_breaking_label=$HAS_BREAKING_LABEL" >> $GITHUB_OUTPUT
          echo "has_feature_label=$HAS_FEATURE_LABEL" >> $GITHUB_OUTPUT
          echo "has_fix_label=$HAS_FIX_LABEL" >> $GITHUB_OUTPUT

      - name: Determine version bump type
        id: bump_type
        run: |
          BRANCH="${{ steps.merge_info.outputs.branch_name }}"
          TARGET_BRANCH="${{ github.ref_name }}"
          
          # From conventional commits
          HAS_BREAKING="${{ steps.analyze_commits.outputs.has_breaking }}"
          HAS_FEATURE="${{ steps.analyze_commits.outputs.has_feature }}"
          HAS_FIX="${{ steps.analyze_commits.outputs.has_fix }}"
          
          # From PR labels (if available)
          HAS_BREAKING_LABEL="${{ steps.pr_labels.outputs.has_breaking_label }}"
          HAS_FEATURE_LABEL="${{ steps.pr_labels.outputs.has_feature_label }}"
          HAS_FIX_LABEL="${{ steps.pr_labels.outputs.has_fix_label }}"
          
          echo "=== Version Bump Detection ==="
          echo "Branch: $BRANCH"
          echo "Target: $TARGET_BRANCH"
          echo "Breaking changes in commits: $HAS_BREAKING"
          echo "Features in commits: $HAS_FEATURE"
          echo "Fixes in commits: $HAS_FIX"
          echo "Breaking label: $HAS_BREAKING_LABEL"
          echo "Feature label: $HAS_FEATURE_LABEL"
          echo "Fix label: $HAS_FIX_LABEL"
          
          # Determine bump type with priority:
          # 1. Breaking changes (MAJOR)
          # 2. Features (MINOR)
          # 3. Fixes (PATCH)
          
          BUMP_TYPE="patch"
          
          # Check for breaking changes (highest priority)
          if [[ "$HAS_BREAKING" == "true" ]] || [[ "$HAS_BREAKING_LABEL" == "true" ]] || [[ "$BRANCH" == breaking/* ]]; then
            BUMP_TYPE="major"
            echo "✓ MAJOR version bump detected (breaking changes)"
          # Check for features
          elif [[ "$HAS_FEATURE" == "true" ]] || [[ "$HAS_FEATURE_LABEL" == "true" ]] || [[ "$BRANCH" == feature/* ]] || [[ "$BRANCH" == feat/* ]]; then
            BUMP_TYPE="minor"
            echo "✓ MINOR version bump detected (new features)"
          # Default to patch for fixes and improvements
          elif [[ "$HAS_FIX" == "true" ]] || [[ "$HAS_FIX_LABEL" == "true" ]] || [[ "$BRANCH" == fix/* ]] || [[ "$BRANCH" == bug/* ]] || [[ "$BRANCH" == improvement/* ]]; then
            BUMP_TYPE="patch"
            echo "✓ PATCH version bump detected (fixes/improvements)"
          else
            BUMP_TYPE="patch"
            echo "⚠ No clear indicators - defaulting to PATCH"
          fi
          
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Final decision: $BUMP_TYPE"

      - name: Calculate new version
        id: new_version
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"
          BUMP_TYPE="${{ steps.bump_type.outputs.bump_type }}"
          
          # Remove 'v' prefix if present
          VERSION=${LATEST_TAG#v}
          
          # Split version into components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Bump the appropriate version component
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Previous version: $LATEST_TAG"
          echo "New version: $NEW_VERSION ($BUMP_TYPE bump)"

      - name: Create and push tag
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          BUMP_TYPE="${{ steps.bump_type.outputs.bump_type }}"
          BRANCH="${{ steps.merge_info.outputs.branch_name }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create annotated tag with details
          TAG_MSG=$(printf "Release %s\n\nBump type: %s\nSource branch: %s\nTarget branch: %s\nCommit: %s" \
            "$NEW_VERSION" "$BUMP_TYPE" "$BRANCH" "${{ github.ref_name }}" "${{ github.sha }}")
          git tag -a "$NEW_VERSION" -m "$TAG_MSG"
          
          git push origin "$NEW_VERSION"
          echo "✓ Created and pushed tag: $NEW_VERSION"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.new_version.outputs.new_version }}
          release_name: Release ${{ steps.new_version.outputs.new_version }}
          body: |
            Release ${{ steps.new_version.outputs.new_version }}
            
            Type: ${{ steps.bump_type.outputs.bump_type }} release
            Branch: ${{ steps.merge_info.outputs.branch_name }}
            Target: ${{ github.ref_name }}
            
            Changes: See commit history for details.
            
            Version determined by conventional commits, PR labels, and branch naming.
          draft: false
          prerelease: ${{ github.ref_name == 'develop' }}