name: Run Tests

on:
  push:
    branches:
      - main
      - develop
      - production
  pull_request:
    branches:
      - main
      - develop
      - production
      - 'feature/**'
      - 'bug/**'
      - 'improvement/**'
      - 'dependabot/**'

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    env:
      TZ: 'America/New_York'

    strategy:
      matrix:
        project: ['frontend']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd ./${{ matrix.project }}
          npm ci

      - name: Run tests
        run: |
          cd ./${{ matrix.project }}
          npm test